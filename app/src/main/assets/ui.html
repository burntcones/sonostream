<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Sonos Streamer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --surface2: #1c1c1c;
  --border: #262626;
  --text: #e8e8e8;
  --text2: #888;
  --accent: #ff6b2b;
  --accent2: #ff8f5e;
  --green: #34d399;
  --radius: 14px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html, body {
  font-family: 'DM Sans', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100%;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  -webkit-font-smoothing: antialiased;
}

/* ── Layout ── */
.app {
  display: flex;
  flex-direction: column;
  height: 100%;
  max-width: 600px;
  margin: 0 auto;
}

/* ── Tablet: two-column layout ── */
@media (min-width: 768px) {
  .app {
    max-width: none;
    flex-direction: row;
    flex-wrap: wrap;
  }
  .header { width: 100%; flex-shrink: 0; padding: 20px 28px 14px; }
  .speaker-bar { width: 100%; padding: 0 28px 14px; }
  .file-area {
    flex: 1;
    min-width: 0;
    border-right: 1px solid var(--border);
    /* Explicit bounded height: in flex-wrap row mode, cross-axis stretching
       otherwise makes the file-area grow to its content size and overflow:auto
       never creates a scroll container. Matches player-bar's height above. */
    height: calc(100vh - 120px);
  }
  .file-list-scroll {
    padding-bottom: 24px !important;
  }
  .resizer {
    display: block;
    flex-shrink: 0;
    width: 6px;
    height: calc(100vh - 120px);
    cursor: col-resize;
    background: transparent;
    position: relative;
    touch-action: none;
  }
  .resizer::before {
    content: '';
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 2px;
    height: 32px;
    background: var(--border);
    border-radius: 1px;
    transition: background 0.15s;
  }
  .resizer:hover::before, .resizer.dragging::before {
    background: var(--accent);
  }
  .player-bar {
    position: static !important;
    transform: none !important;
    width: 340px;
    flex-shrink: 0;
    height: calc(100vh - 120px);
    overflow-y: auto;
  }
  .player-bar .player-inner {
    border-top: none;
    border-left: 1px solid var(--border);
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .player-bar .player-progress { height: 4px; }
  .player-bar .player-track { padding: 20px 24px 8px; }
  .player-bar .player-track-name { font-size: 18px; }
  .player-bar .player-controls { gap: 16px; padding: 16px 20px 20px; }
  .player-bar .ctrl-btn { width: 52px; height: 52px; }
  .player-bar .ctrl-btn svg { width: 26px; height: 26px; }
  .player-bar .ctrl-btn.play-pause { width: 64px; height: 64px; }
  .player-bar .ctrl-btn.play-pause svg { width: 32px; height: 32px; }
  .player-bar .volume-row { padding: 0 24px 24px; }
  .player-bar { transform: none !important; }
  .search-bar { padding: 0 28px 12px; }
  .file-item { padding: 14px 28px; }
  .folder-header { padding: 10px 28px 6px; }
  .sort-bar { padding: 0 28px 10px; }
  .sheet { max-width: 600px; }
}

.header {
  padding: 16px 20px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-icon {
  width: 32px;
  height: 32px;
  background: var(--accent);
  border-radius: 8px;
  display: grid;
  place-items: center;
}

.logo-icon svg { width: 18px; height: 18px; }

.logo h1 {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.3px;
}

.logo h1 span { color: var(--text2); font-weight: 300; }

.btn-icon {
  width: 40px;
  height: 40px;
  border: none;
  background: var(--surface);
  border-radius: 10px;
  color: var(--text2);
  display: grid;
  place-items: center;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-icon:active { transform: scale(0.92); background: var(--surface2); }
.btn-icon.active { color: var(--accent); }
.btn-icon svg { width: 20px; height: 20px; }

/* ── Speaker Picker ── */
.speaker-bar {
  padding: 0 20px 12px;
  flex-shrink: 0;
}

.speaker-select {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: border-color 0.15s;
}

.speaker-select:active { border-color: var(--accent); }

.speaker-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--text2);
  flex-shrink: 0;
}

.speaker-dot.connected { background: var(--green); }

.speaker-name {
  flex: 1;
  font-size: 14px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.speaker-model {
  font-size: 12px;
  color: var(--text2);
}

.speaker-chevron { color: var(--text2); flex-shrink: 0; }

/* ── Speaker Sheet ── */
.sheet-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}

.sheet-overlay.open { opacity: 1; pointer-events: auto; }

.sheet {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  max-width: 500px;
  margin: 0 auto;
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  z-index: 101;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
  max-height: 60vh;
  overflow-y: auto;
  padding-bottom: var(--safe-bottom);
}

.sheet.open { transform: translateY(0); }

.sheet-handle {
  width: 36px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 10px auto 0;
}

.sheet-title {
  padding: 16px 20px 8px;
  font-size: 16px;
  font-weight: 700;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.sheet-title button {
  font-size: 12px;
  padding: 6px 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--accent);
  font-family: inherit;
  font-weight: 500;
  cursor: pointer;
}

.sheet-title button:active { opacity: 0.7; }

.speaker-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 20px;
  cursor: pointer;
  transition: background 0.1s;
}

.speaker-item:active { background: var(--surface2); }
.speaker-item.selected { background: var(--surface2); }

.speaker-item .sp-icon {
  width: 40px; height: 40px;
  background: var(--surface2);
  border-radius: 10px;
  display: grid;
  place-items: center;
  color: var(--text2);
}

.speaker-item.selected .sp-icon { background: var(--accent); color: #fff; }

.speaker-item .sp-info { flex: 1; }
.speaker-item .sp-info .sp-name { font-size: 14px; font-weight: 500; }
.speaker-item .sp-info .sp-model { font-size: 12px; color: var(--text2); }

.speaker-item .sp-check { color: var(--accent); opacity: 0; }
.speaker-item.selected .sp-check { opacity: 1; }

.empty-state {
  padding: 30px 20px;
  text-align: center;
  color: var(--text2);
  font-size: 14px;
}

/* Resizer handle between file-area and player-bar (tablet only) */
.resizer { display: none; }

/* ── File List ──
   .file-area is a flex-column container that owns a non-scrolling toolbar
   (.file-toolbar with search + sort) at the top, and a scrolling list area
   (.file-list-scroll) below it. Keeping the toolbar OUTSIDE the scroll
   container is what prevents previously-scrolled file items from showing
   above the sticky folder header — no sticky positioning fragility to get
   wrong. */
.file-area {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.file-toolbar {
  flex-shrink: 0;
  background: var(--bg);
}

.file-list-scroll {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: calc(200px + var(--safe-bottom));
}

.search-bar {
  padding: 0 20px 10px;
  background: var(--bg);
}

.search-input {
  width: 100%;
  padding: 10px 14px 10px 38px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  outline: none;
  transition: border-color 0.15s;
}

.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text2); }

.search-icon {
  position: absolute;
  left: 32px;
  top: 50%;
  transform: translateY(calc(-50% - 5px));
  color: var(--text2);
  pointer-events: none;
}

.sort-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 20px 8px;
}

.sort-btn {
  font-family: inherit;
  font-size: 11px;
  font-weight: 600;
  padding: 5px 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
}

.sort-btn.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

.sort-btn:active { transform: scale(0.95); }

.file-count {
  margin-left: auto;
  font-size: 11px;
  color: var(--text2);
}

.folder-header {
  padding: 8px 20px 4px;
  font-size: 11px;
  font-weight: 700;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 5;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  user-select: none;
}

.folder-header .folder-chevron {
  transition: transform 0.2s;
  color: var(--text2);
}

.folder-header.collapsed .folder-chevron {
  transform: rotate(-90deg);
}

.folder-contents.collapsed {
  display: none;
}

.file-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 20px;
  cursor: pointer;
  transition: background 0.1s;
}

.file-item:active { background: var(--surface); }
.file-item.playing { background: var(--surface); }

.file-icon {
  width: 44px; height: 44px;
  background: var(--surface);
  border-radius: 10px;
  display: grid;
  place-items: center;
  flex-shrink: 0;
  color: var(--text2);
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
}

.file-item.playing .file-icon {
  background: var(--accent);
  color: #fff;
}

.file-info { flex: 1; min-width: 0; }

.file-name {
  font-size: 14px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.file-meta {
  font-size: 12px;
  color: var(--text2);
  margin-top: 2px;
}

.file-action {
  flex-shrink: 0;
  color: var(--text2);
  opacity: 0.5;
}

.file-item.playing .file-action { color: var(--accent); opacity: 1; }

/* ── Now Playing Bar ── */
.player-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  max-width: 500px;
  margin: 0 auto;
  z-index: 50;
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
  padding-bottom: var(--safe-bottom);
}

.player-bar.visible { transform: translateY(0); }

.player-inner {
  background: var(--surface);
  border-top: 1px solid var(--border);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

.player-progress {
  height: 3px;
  background: var(--border);
  position: relative;
  cursor: pointer;
}

.player-progress-fill {
  height: 100%;
  background: var(--accent);
  width: 0%;
  transition: width 0.5s linear;
}

.player-track {
  padding: 12px 20px 4px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.player-track-info { flex: 1; min-width: 0; }

.player-track-name {
  font-size: 14px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.player-track-time {
  font-size: 11px;
  color: var(--text2);
  font-variant-numeric: tabular-nums;
}

.player-controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  padding: 8px 16px 12px;
}

.ctrl-btn {
  width: 40px; height: 40px;
  border: none;
  background: none;
  color: var(--text);
  display: grid;
  place-items: center;
  cursor: pointer;
  border-radius: 50%;
  transition: all 0.12s;
}

.ctrl-btn:active { transform: scale(0.88); opacity: 0.7; }
.ctrl-btn svg { width: 22px; height: 22px; }

.ctrl-btn.play-pause {
  width: 52px; height: 52px;
  background: var(--accent);
  color: #fff;
}

.ctrl-btn.play-pause svg { width: 26px; height: 26px; }

.volume-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 20px 14px;
}

.volume-row svg { width: 16px; height: 16px; color: var(--text2); flex-shrink: 0; }

.volume-slider {
  flex: 1;
  -webkit-appearance: none;
  appearance: none;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  outline: none;
}

.volume-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px; height: 18px;
  background: var(--text);
  border-radius: 50%;
  cursor: pointer;
}

/* ── Loading / Scanning ── */
.scanning {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  font-size: 12px;
  color: var(--accent);
}

@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
  width: 14px; height: 14px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}

/* ── Toast Notifications ── */
.toast-container {
  position: fixed;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 200;
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-width: 460px;
  width: calc(100% - 40px);
  pointer-events: none;
}

.toast {
  padding: 12px 16px;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 500;
  line-height: 1.4;
  pointer-events: auto;
  animation: toastIn 0.3s cubic-bezier(0.32, 0.72, 0, 1), toastOut 0.3s 3s forwards;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

.toast.error {
  background: rgba(220, 38, 38, 0.9);
  color: #fff;
}

.toast.warning {
  background: rgba(245, 158, 11, 0.9);
  color: #000;
}

.toast.info {
  background: rgba(59, 130, 246, 0.85);
  color: #fff;
}

.toast.success {
  background: rgba(52, 211, 153, 0.9);
  color: #000;
}

@keyframes toastIn {
  from { opacity: 0; transform: translateY(-12px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

@keyframes toastOut {
  from { opacity: 1; }
  to { opacity: 0; transform: translateY(-8px); pointer-events: none; }
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 0; }

/* ── Pulse animation for playing ── */
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}
/* ── Update Banner ── */
.update-banner {
  display: none;
  padding: 10px 20px;
  background: linear-gradient(135deg, var(--accent), #e05a1f);
  color: #fff;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: opacity 0.15s;
  flex-shrink: 0;
  text-align: center;
}

.update-banner.visible { display: block; }
.update-banner:active { opacity: 0.8; }
.update-banner .update-version { font-weight: 700; }
.update-banner .update-progress { display: none; margin-top: 4px; }
.update-banner .update-progress-bar {
  height: 3px;
  background: rgba(255,255,255,0.3);
  border-radius: 2px;
  margin-top: 6px;
  overflow: hidden;
}
.update-banner .update-progress-fill {
  height: 100%;
  background: #fff;
  width: 0%;
  transition: width 0.3s;
}

.playing-pulse { animation: pulse 1.5s ease-in-out infinite; }
</style>
</head>
<body>
<div class="toast-container" id="toastContainer"></div>
<div class="app" id="app">

  <!-- Update Banner -->
  <div class="update-banner" id="updateBanner">
    Update available: <span class="update-version" id="updateVersion"></span>
    <span id="updateAction"> — Tap to install</span>
    <div class="update-progress" id="updateProgress">
      <div class="update-progress-bar"><div class="update-progress-fill" id="updateProgressFill"></div></div>
    </div>
  </div>

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round">
          <path d="M4 16V10M8 18V7M12 20V4M16 18V8M20 16V11"/>
        </svg>
      </div>
      <h1>Aux</h1>
    </div>
    <button class="btn-icon" id="btnRefreshFiles" title="Refresh files">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16"/>
      </svg>
    </button>
  </div>

  <!-- Speaker Picker -->
  <div class="speaker-bar">
    <div class="speaker-select" id="speakerToggle">
      <div class="speaker-dot" id="speakerDot"></div>
      <div class="speaker-name" id="speakerLabel">Select Speaker…</div>
      <div class="speaker-model" id="speakerModel"></div>
      <div class="speaker-chevron">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
      </div>
    </div>
  </div>

  <!-- File List -->
  <div class="file-area" id="fileArea">
    <div class="file-toolbar">
      <div class="search-bar" style="position:relative">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
        <input class="search-input" id="searchInput" type="text" placeholder="Search files…">
      </div>
      <div class="sort-bar">
        <button class="sort-btn active" data-sort="name">Name</button>
        <button class="sort-btn" data-sort="size">Size</button>
        <button class="sort-btn" data-sort="folder">Folder</button>
        <span class="file-count" id="fileCount"></span>
      </div>
    </div>
    <div class="file-list-scroll" id="fileListScroll">
      <div id="fileList"></div>
    </div>
  </div>

  <!-- Resizer handle (tablet only) -->
  <div class="resizer" id="resizer"></div>

  <!-- Player Bar -->
  <div class="player-bar" id="playerBar">
    <div class="player-inner">
      <div class="player-progress" id="progressBar">
        <div class="player-progress-fill" id="progressFill"></div>
      </div>
      <div class="player-track">
        <div class="player-track-info">
          <div class="player-track-name" id="trackName">—</div>
          <div class="player-track-time"><span id="trackPos">0:00</span> / <span id="trackDur">0:00</span> · <span id="queuePos"></span></div>
        </div>
      </div>
      <div class="player-controls">
        <button class="ctrl-btn" id="btnPrev">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>
        <button class="ctrl-btn play-pause" id="btnPlayPause">
          <svg viewBox="0 0 24 24" fill="currentColor" id="iconPlay"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="ctrl-btn" id="btnNext">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 18h2V6h-2zM6 18l8.5-6L6 6z"/></svg>
        </button>
        <button class="ctrl-btn" id="btnStop">
          <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
        </button>
      </div>
      <div id="volumeControls">
        <!-- Per-speaker volume sliders rendered by JS -->
      </div>
      <!-- EQ Section (Parametric EQ with streaming DSP) -->
      <div id="eqSection" style="padding:8px 20px 16px;display:none;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-size:12px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:var(--text2);">EQ</span>
            <button id="btnEqBypass" style="padding:2px 8px;font-size:10px;border:1px solid var(--border);border-radius:6px;background:var(--accent);color:#fff;cursor:pointer;">ON</button>
          </div>
          <div style="display:flex;gap:6px;">
            <button id="btnEqAdd" style="padding:2px 8px;font-size:10px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text2);cursor:pointer;">+ Band</button>
            <button id="btnEqReset" style="padding:2px 8px;font-size:10px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text2);cursor:pointer;">Reset</button>
          </div>
        </div>
        <canvas id="eqCanvas" width="600" height="300" style="width:100%;height:200px;background:var(--surface);border-radius:10px;border:1px solid var(--border);touch-action:none;"></canvas>
        <div id="eqDragLabel" style="display:none;position:absolute;z-index:120;background:rgba(0,0,0,0.85);color:#fff;padding:4px 8px;border-radius:6px;font-size:11px;font-family:monospace;pointer-events:none;white-space:nowrap;"></div>
        <div id="eqBandList" style="margin-top:6px;font-size:10px;color:var(--text2);display:flex;flex-wrap:wrap;gap:4px;"></div>
      </div>
      <!-- Band Edit Popup (tap a band node on the canvas) -->
      <div id="eqEditPopup" style="display:none;position:fixed;z-index:150;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;width:260px;box-shadow:0 8px 30px rgba(0,0,0,0.5);">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <span style="font-size:12px;font-weight:700;color:var(--text);" id="eqEditTitle">Band 1</span>
          <div style="display:flex;gap:6px;">
            <button id="eqEditToggle" onclick="toggleEditingBand()" style="padding:2px 8px;font-size:10px;border:1px solid var(--border);border-radius:6px;background:none;color:var(--text2);cursor:pointer;">On</button>
            <button onclick="removeEditingBand()" style="padding:2px 8px;font-size:10px;border:1px solid #f87171;border-radius:6px;background:none;color:#f87171;cursor:pointer;">Delete</button>
            <button onclick="closeEqEdit()" style="padding:2px 8px;font-size:10px;border:1px solid var(--border);border-radius:6px;background:none;color:var(--text2);cursor:pointer;">Done</button>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;">
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-size:10px;color:var(--text2);min-width:32px;">Freq</span>
            <input class="volume-slider" type="range" min="20" max="20000" id="eqEditFreq" style="flex:1;">
            <span style="font-size:10px;color:var(--text2);min-width:40px;text-align:right;" id="eqEditFreqLabel">1000 Hz</span>
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-size:10px;color:var(--text2);min-width:32px;">Gain</span>
            <input class="volume-slider" type="range" min="-150" max="150" value="0" id="eqEditGain" style="flex:1;">
            <span style="font-size:10px;color:var(--text2);min-width:40px;text-align:right;" id="eqEditGainLabel">0.0 dB</span>
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-size:10px;color:var(--text2);min-width:32px;">Q</span>
            <input class="volume-slider" type="range" min="1" max="180" value="10" id="eqEditQ" style="flex:1;">
            <span style="font-size:10px;color:var(--text2);min-width:40px;text-align:right;" id="eqEditQLabel">1.0</span>
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-size:10px;color:var(--text2);min-width:32px;">Type</span>
            <select id="eqEditType" style="flex:1;padding:4px 8px;font-size:11px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);">
              <option value="BELL">Bell</option>
              <option value="LOW_SHELF">Low Shelf</option>
              <option value="HIGH_SHELF">High Shelf</option>
              <option value="HIGH_PASS">High Pass</option>
              <option value="LOW_PASS">Low Pass</option>
            </select>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Speaker Sheet -->
  <div class="sheet-overlay" id="sheetOverlay"></div>
  <!-- Debug Log Panel (long-press logo to toggle) -->
  <div id="debugPanel" style="display:none;position:fixed;inset:0;z-index:200;background:var(--bg);overflow-y:auto;padding:16px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <h2 style="font-size:16px;">Debug Logs</h2>
      <div style="display:flex;gap:8px;">
        <button onclick="refreshDebugLogs()" style="padding:6px 12px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-size:12px;">Refresh</button>
        <button onclick="$('debugPanel').style.display='none'" style="padding:6px 12px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-size:12px;">Close</button>
      </div>
    </div>
    <pre id="debugContent" style="font-size:11px;color:var(--text2);white-space:pre-wrap;word-break:break-all;font-family:monospace;line-height:1.6;"></pre>
  </div>

  <div class="sheet" id="speakerSheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">
      Speakers
      <div style="display:flex;gap:8px;">
        <button id="btnSelectAll">All</button>
        <button id="btnRescan">Rescan</button>
        <button id="btnSheetDone" style="background:var(--accent);color:#fff;">Done</button>
      </div>
    </div>
    <div id="speakerList"></div>
  </div>

</div>

<script>
// ─── State ──────────────────────────────────────────────────────────────────
let speakers = [];
let files = [];
let selectedSpeakers = [];
let currentFile = null;
let isPlaying = false;
let pollTimer = null;
let polling = false;
let queue = [];
let queueIndex = -1;
let lastPlayState = null;

function isLocalSpeaker(sp) { return sp && sp.ip === 'local'; }
function hasLocalSpeaker() { return selectedSpeakers.some(isLocalSpeaker); }
function sonosSpeakers() { return selectedSpeakers.filter(s => !isLocalSpeaker(s)); }
let autoAdvancing = false;
let sortMode = 'name';
let collapsedFolders = new Set();

const $ = id => document.getElementById(id);

// ─── Toast Notifications ───────────────────────────────────────────────────
function showToast(message, type = 'error') {
  const container = $('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(() => { if (toast.parentNode) toast.remove(); }, 3500);
}

// ─── API ────────────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    throw new Error(err.error || `Request failed (${r.status})`);
  }
  return r.json();
}

// ─── Speakers ───────────────────────────────────────────────────────────────
async function loadSpeakers() {
  try {
    const data = await api('GET', '/api/speakers');
    speakers = data.speakers || [];
    renderSpeakerList();
    if (speakers.length === 1 && selectedSpeakers.length === 0) toggleSpeaker(speakers[0]);
    updateSpeakerBar();
  } catch (e) {
    showToast('Could not load speakers. Check WiFi connection.', 'error');
  }
}

async function rescanSpeakers() {
  $('btnRescan').textContent = 'Scanning…';
  try {
    const data = await api('GET', '/api/discover');
    speakers = data.speakers || [];
    renderSpeakerList();
    if (speakers.length === 1 && selectedSpeakers.length === 0) toggleSpeaker(speakers[0]);
    updateSpeakerBar();
    if (!speakers.length) {
      // Show diagnostics so user (or dev) can see exactly what happened
      const diag = data.diagnostics || 'No diagnostics available';
      showToast('No speakers found — see details below', 'warning');
      $('fileList').innerHTML = `<div class="empty-state" style="text-align:left;font-size:12px;font-family:monospace;white-space:pre-wrap;padding:20px;color:var(--text2);">Discovery Diagnostics:\n\n${diag}\n\nCheck:\n• Phone and speakers on same WiFi?\n• Router AP isolation OFF?\n• Sonos UPnP enabled? (Settings > Privacy)</div>`;
    } else {
      showToast(`Found ${speakers.length} speaker${speakers.length > 1 ? 's' : ''}`, 'success');
    }
  } catch (e) {
    showToast('Network scan failed. Check WiFi connection.', 'error');
  } finally {
    $('btnRescan').textContent = 'Rescan';
  }
}

function toggleSpeaker(sp) {
  const idx = selectedSpeakers.findIndex(s => s.name === sp.name);
  if (idx >= 0) {
    selectedSpeakers.splice(idx, 1);
  } else {
    selectedSpeakers.push(sp);
  }
  updateSpeakerBar();
  renderSpeakerList();
  renderVolumeControls();
  if (selectedSpeakers.length > 0) fetchStatus();
}

function selectAllSpeakers() {
  selectedSpeakers = [...speakers];
  updateSpeakerBar();
  renderSpeakerList();
  renderVolumeControls();
}

function deselectAllSpeakers() {
  selectedSpeakers = [];
  updateSpeakerBar();
  renderSpeakerList();
  renderVolumeControls();
}

function updateSpeakerBar() {
  if (selectedSpeakers.length === 1) {
    $('speakerLabel').textContent = selectedSpeakers[0].name;
    $('speakerModel').textContent = selectedSpeakers[0].model;
    $('speakerDot').classList.add('connected');
  } else if (selectedSpeakers.length > 1) {
    $('speakerLabel').textContent = `${selectedSpeakers.length} speakers`;
    $('speakerModel').textContent = selectedSpeakers.map(s => s.name).join(', ');
    $('speakerDot').classList.add('connected');
  } else {
    $('speakerLabel').textContent = speakers.length ? 'Select Speaker…' : 'No speakers found';
    $('speakerModel').textContent = '';
    $('speakerDot').classList.remove('connected');
  }
}

function renderSpeakerList() {
  const el = $('speakerList');
  if (!speakers.length) {
    el.innerHTML = '<div class="empty-state">No Sonos speakers found on your network.<br>Make sure you\'re on the same WiFi.</div>';
    return;
  }
  el.innerHTML = speakers.map(sp => {
    const memberCount = sp.group_members ? sp.group_members.length : 0;
    const groupBadge = memberCount > 1 ? `<span style="background:var(--accent);color:#fff;font-size:10px;padding:2px 6px;border-radius:6px;margin-left:6px;">${memberCount} speakers</span>` : '';
    return `
    <div class="speaker-item ${selectedSpeakers.some(s => s.name === sp.name) ? 'selected' : ''}" data-name="${sp.name}">
      <div class="sp-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v18M8 7a4 4 0 0 1 8 0M5 10a7 7 0 0 1 14 0"/></svg>
      </div>
      <div class="sp-info">
        <div class="sp-name">${sp.name}${groupBadge}</div>
        <div class="sp-model">${sp.model} · ${sp.ip}</div>
      </div>
      <div class="sp-check">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>
      </div>
    </div>`;
  }).join('');

  el.querySelectorAll('.speaker-item').forEach(item => {
    item.addEventListener('click', () => {
      const sp = speakers.find(s => s.name === item.dataset.name);
      if (sp) toggleSpeaker(sp);
    });
  });
}

// ─── Sheet ──────────────────────────────────────────────────────────────────
function openSheet() {
  $('sheetOverlay').classList.add('open');
  $('speakerSheet').classList.add('open');
}
function closeSheet() {
  $('sheetOverlay').classList.remove('open');
  $('speakerSheet').classList.remove('open');
}

$('speakerToggle').addEventListener('click', openSheet);
$('sheetOverlay').addEventListener('click', closeSheet);
$('btnRescan').addEventListener('click', rescanSpeakers);
$('btnSheetDone').addEventListener('click', closeSheet);
$('btnSelectAll').addEventListener('click', () => {
  if (selectedSpeakers.length === speakers.length) {
    deselectAllSpeakers();
  } else {
    selectAllSpeakers();
  }
});

// ─── Files ──────────────────────────────────────────────────────────────────
async function loadFiles() {
  try {
    const data = await api('GET', '/api/files');
    files = data.files || [];
    renderFiles();
    if (!files.length) showToast('No audio files found on this device.', 'warning');
  } catch (e) {
    showToast('Could not load audio files.', 'error');
  }
}

function renderFiles(filter = '') {
  const el = $('fileList');
  const q = filter.toLowerCase();
  let filtered = q ? files.filter(f => f.name.toLowerCase().includes(q) || f.path.toLowerCase().includes(q)) : [...files];

  // Update file count
  $('fileCount').textContent = `${filtered.length} file${filtered.length !== 1 ? 's' : ''}`;

  if (!filtered.length) {
    el.innerHTML = `<div class="empty-state">${files.length
      ? 'No matches found'
      : 'No audio files found on this device.<br>Copy music files to your phone to get started.'}</div>`;
    return;
  }

  // Sort
  if (sortMode === 'name') {
    filtered.sort((a, b) => a.name.localeCompare(b.name));
  } else if (sortMode === 'size') {
    filtered.sort((a, b) => b.size - a.size);
  }
  // 'folder' keeps default grouping order

  // Group by directory
  const groups = {};
  filtered.forEach(f => {
    const dir = f.dir || 'Root';
    (groups[dir] = groups[dir] || []).push(f);
  });

  let html = '';
  for (const [dir, items] of Object.entries(groups)) {
    const isCollapsed = collapsedFolders.has(dir);
    html += `<div class="folder-header ${isCollapsed ? 'collapsed' : ''}" data-folder="${dir}">
      <span>${dir} (${items.length})</span>
      <svg class="folder-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
    </div>`;
    html += `<div class="folder-contents ${isCollapsed ? 'collapsed' : ''}" data-folder-content="${dir}">`;
    items.forEach(f => {
      const playing = currentFile === f.path;
      const size = f.size > 1048576 ? (f.size / 1048576).toFixed(1) + ' MB' : (f.size / 1024).toFixed(0) + ' KB';
      html += `
        <div class="file-item ${playing ? 'playing' : ''}" data-path="${f.path}">
          <div class="file-icon">${playing ? '<span class="playing-pulse">♫</span>' : f.ext.replace('.', '')}</div>
          <div class="file-info">
            <div class="file-name">${f.name}</div>
            <div class="file-meta">${f.ext.replace('.', '').toUpperCase()} · ${size}</div>
          </div>
          <div class="file-action">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          </div>
        </div>`;
    });
    html += `</div>`;
  }
  el.innerHTML = html;

  el.querySelectorAll('.file-item').forEach(item => {
    item.addEventListener('click', () => playFile(item.dataset.path));
  });

  el.querySelectorAll('.folder-header').forEach(header => {
    header.addEventListener('click', () => {
      const folder = header.dataset.folder;
      const content = el.querySelector(`[data-folder-content="${folder}"]`);
      if (collapsedFolders.has(folder)) {
        collapsedFolders.delete(folder);
        header.classList.remove('collapsed');
        content.classList.remove('collapsed');
      } else {
        collapsedFolders.add(folder);
        header.classList.add('collapsed');
        content.classList.add('collapsed');
      }
    });
  });
}

$('searchInput').addEventListener('input', e => renderFiles(e.target.value));
$('btnRefreshFiles').addEventListener('click', loadFiles);

document.querySelectorAll('.sort-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    sortMode = btn.dataset.sort;
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderFiles($('searchInput').value);
  });
});

// ─── Playback ───────────────────────────────────────────────────────────────
async function playFile(path, buildQueue = true) {
  if (!selectedSpeakers.length) { openSheet(); return; }

  // Build queue from currently visible files
  if (buildQueue) {
    const q = $('searchInput').value.toLowerCase();
    queue = q ? files.filter(f => f.name.toLowerCase().includes(q) || f.path.toLowerCase().includes(q)) : [...files];
    queueIndex = queue.findIndex(f => f.path === path);
    if (queueIndex < 0) queueIndex = 0;
  }

  currentFile = path;
  lastPlayState = 'PLAYING';
  renderFiles($('searchInput').value);

  const name = path.split('/').pop().replace(/\.[^.]+$/, '');
  $('trackName').textContent = name;
  updateQueueIndicator();
  $('playerBar').classList.add('visible');
  // On tablet, player sidebar is always visible via CSS

  try {
    let result;
    const local = selectedSpeakers.find(isLocalSpeaker);
    const sonos = sonosSpeakers();
    // Play on local device if selected
    if (local) {
      result = await api('POST', '/api/local/play', { file: path });
    }
    // Play on Sonos speakers. For single-speaker playback we also send the
    // full queue so the server can auto-advance when a track ends naturally
    // — this runs regardless of whether the tablet screen is on or the
    // WebView's JS timers are throttled, which was the cause of long silent
    // gaps between tracks.
    if (sonos.length > 1) {
      result = await api('POST', '/api/play-multi', { speakers: sonos.map(s => s.name), file: path });
    } else if (sonos.length === 1) {
      result = await api('POST', '/api/play', {
        speaker: sonos[0].name,
        file: path,
        queue: queue.map(f => f.path),
        queue_index: queueIndex,
      });
    }
    if (result && result.success === false) {
      showToast('Speaker could not play this file.', 'error');
      return;
    }
    isPlaying = true;
    updatePlayIcon();
    startPolling();
  } catch (e) {
    showToast('Failed to play. Speaker may be offline.', 'error');
  }
}

async function togglePlay() {
  if (!selectedSpeakers.length) return;
  const action = isPlaying ? 'Pause' : 'Play';
  try {
    if (hasLocalSpeaker()) await api('POST', '/api/local/control', { action });
    const sonos = sonosSpeakers();
    if (sonos.length > 1) {
      await api('POST', '/api/control-multi', { speakers: sonos.map(s => s.name), action });
    } else if (sonos.length === 1) {
      await api('POST', '/api/control', { speaker: sonos[0].name, action });
    }
    isPlaying = !isPlaying;
    updatePlayIcon();
  } catch (e) {
    showToast('Playback control failed. Speaker may be offline.', 'error');
  }
}

async function stop() {
  if (!selectedSpeakers.length) return;
  try {
    if (hasLocalSpeaker()) await api('POST', '/api/local/control', { action: 'Stop' });
    const sonos = sonosSpeakers();
    if (sonos.length > 1) {
      await api('POST', '/api/control-multi', { speakers: sonos.map(s => s.name), action: 'Stop' });
    } else if (sonos.length === 1) {
      await api('POST', '/api/control', { speaker: sonos[0].name, action: 'Stop' });
    }
    isPlaying = false;
    updatePlayIcon();
    stopPolling();
  } catch (e) {
    showToast('Could not stop playback.', 'error');
  }
}

function playNext(dir) {
  if (!queue.length) return;
  let next = queueIndex + dir;
  if (next >= queue.length) next = 0; // wrap (repeat)
  if (next < 0) next = queue.length - 1; // wrap backward
  queueIndex = next;
  playFile(queue[queueIndex].path, false);
}

function updateQueueIndicator() {
  const el = $('queuePos');
  if (el && queue.length > 0) {
    el.textContent = `${queueIndex + 1} / ${queue.length}`;
  }
}

function updatePlayIcon() {
  $('iconPlay').innerHTML = isPlaying
    ? '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>'
    : '<path d="M8 5v14l11-7z"/>';
}

$('btnPlayPause').addEventListener('click', togglePlay);
$('btnStop').addEventListener('click', stop);
$('btnPrev').addEventListener('click', () => playNext(-1));
$('btnNext').addEventListener('click', () => playNext(1));

// ─── Volume ─────────────────────────────────────────────────────────────────
function renderVolumeControls() {
  const el = $('volumeControls');
  if (selectedSpeakers.length === 0) { el.innerHTML = ''; return; }

  el.innerHTML = selectedSpeakers.map(sp => `
    <div class="volume-row" style="flex-direction:column;gap:4px;padding:4px 20px;">
      <div style="display:flex;align-items:center;gap:10px;width:100%;">
        <svg style="flex-shrink:0;" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5z"/></svg>
        <input class="volume-slider" type="range" min="0" max="100" value="50" data-speaker="${sp.name}" style="flex:1;">
        <span style="font-size:11px;color:var(--text2);min-width:28px;text-align:right;" data-vol-label="${sp.name}">50</span>
      </div>
      <div style="font-size:10px;color:var(--text2);padding-left:26px;">${sp.name}</div>
    </div>
  `).join('');

  el.querySelectorAll('.volume-slider').forEach(slider => {
    let interacting = false;
    let guardTimer = null;
    slider.addEventListener('input', e => {
      interacting = true;
      // Clear any pending guard expiry from a previous interaction
      if (guardTimer) { clearTimeout(guardTimer); guardTimer = null; }
      const label = el.querySelector(`[data-vol-label="${e.target.dataset.speaker}"]`);
      if (label) label.textContent = e.target.value;
      clearTimeout(slider._volTimeout);
      slider._volTimeout = setTimeout(() => {
        const speakerName = e.target.dataset.speaker;
        const volume = +e.target.value;
        const sp = selectedSpeakers.find(s => s.name === speakerName);
        const isLocal = sp && sp.ip === 'local';
        const url = isLocal ? '/api/local/volume' : '/api/volume';
        const body = isLocal ? { volume } : { speaker: speakerName, volume };
        api('POST', url, body)
          .then(r => {
            if (r.success === false) showToast(`Vol failed (${speakerName}): ${JSON.stringify(r)}`, 'error');
          })
          .catch(err => showToast(`Vol error (${speakerName}): ${err.message}`, 'error'));
      }, 150);
    });
    slider.addEventListener('change', () => {
      // Keep guard active for 5s after release — gives SOAP call time to
      // propagate and the next poll to read the new value back
      if (guardTimer) clearTimeout(guardTimer);
      guardTimer = setTimeout(() => { interacting = false; }, 5000);
    });
    slider._interacting = () => interacting;
  });
}

// ─── Progress Bar Click-to-Seek ─────────────────────────────────────────────
$('progressBar').addEventListener('click', e => {
  if (!selectedSpeakers.length || !currentDuration) return;
  const pct = e.offsetX / e.currentTarget.offsetWidth;
  const seekSec = Math.floor(pct * currentDuration);
  const h = Math.floor(seekSec / 3600);
  const m = Math.floor((seekSec % 3600) / 60);
  const s = seekSec % 60;
  const pos = `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  // Seek on all selected speakers
  selectedSpeakers.forEach(sp => {
    if (isLocalSpeaker(sp)) {
      const seekMs = seekSec * 1000;
      api('POST', '/api/local/seek', { position_ms: seekMs });
    } else {
      api('POST', '/api/seek', { speaker: sp.name, position: pos });
    }
  });
});

// ─── Status Polling ─────────────────────────────────────────────────────────
let currentDuration = 0;
let pollFailCount = 0;
let reconnecting = false;

function parseTime(str) {
  if (!str || str === 'NOT_IMPLEMENTED') return 0;
  const parts = str.split(':').map(Number);
  if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
  if (parts.length === 2) return parts[0] * 60 + parts[1];
  return 0;
}

function fmtTime(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${m}:${String(s).padStart(2, '0')}`;
}

async function fetchStatus() {
  if (!selectedSpeakers.length) return;
  try {
    const primary = selectedSpeakers[0];
    const isPrimaryLocal = isLocalSpeaker(primary);
    const data = isPrimaryLocal
      ? await api('GET', '/api/local/status')
      : await api('GET', `/api/status/${encodeURIComponent(primary.name)}`);
    pollFailCount = 0;

    // Update volume slider for primary speaker
    if (data.volume != null) {
      const el = $('volumeControls');
      const slider = el.querySelector(`[data-speaker="${primary.name}"]`);
      if (slider && !slider._interacting?.()) {
        slider.value = data.volume;
        const label = el.querySelector(`[data-vol-label="${primary.name}"]`);
        if (label) label.textContent = data.volume;
      }
    }

    const dur = parseTime(data.position?.duration);
    const pos = parseTime(data.position?.position);
    currentDuration = dur;

    $('trackPos').textContent = fmtTime(pos);
    $('trackDur').textContent = fmtTime(dur);
    $('progressFill').style.width = dur > 0 ? ((pos / dur) * 100) + '%' : '0%';

    const newState = data.state;
    const wasPlaying = isPlaying;
    isPlaying = newState === 'PLAYING';
    if (wasPlaying !== isPlaying) updatePlayIcon();

    // Push to Android MediaSession (notification mini player)
    if (typeof window.NativeMedia !== 'undefined') {
      const track = data.position?.track || $('trackName').textContent || '';
      const speaker = selectedSpeakers[0]?.name || '';
      window.NativeMedia.updatePlayback(track, speaker, isPlaying, pos * 1000, dur * 1000);
    }

    // Auto-advance: track finished (was PLAYING, now STOPPED, position near duration)
    // For single-speaker Sonos playback the server handles this via
    // ApiServer's PlaybackMonitor — running in Kotlin under the foreground
    // service's wake lock so it works when the screen is off. We only fire
    // the client-side auto-advance when the server isn't (i.e. multi-speaker
    // playback or local-device playback), to avoid double-advancing.
    const sonosNow = sonosSpeakers();
    const serverHandlesAdvance = sonosNow.length === 1 && !hasLocalSpeaker();
    if (!serverHandlesAdvance && !autoAdvancing && lastPlayState === 'PLAYING' && newState === 'STOPPED' && dur > 0 && (dur - pos) < 5 && queue.length > 0) {
      autoAdvancing = true;
      lastPlayState = newState;
      playNext(1);
      setTimeout(() => { autoAdvancing = false; }, 4000);
      return;
    }
    lastPlayState = newState;

    if (data.position?.track && data.position.track !== $('trackName').textContent) {
      $('trackName').textContent = data.position.track;
    }

    // Fetch volume for other selected speakers (non-blocking)
    selectedSpeakers.slice(1).forEach(async sp => {
      try {
        const spData = isLocalSpeaker(sp)
          ? await api('GET', '/api/local/status')
          : await api('GET', `/api/status/${encodeURIComponent(sp.name)}`);
        if (spData.volume != null) {
          const el = $('volumeControls');
          const slider = el.querySelector(`[data-speaker="${sp.name}"]`);
          if (slider && !slider._interacting?.()) {
            slider.value = spData.volume;
            const label = el.querySelector(`[data-vol-label="${sp.name}"]`);
            if (label) label.textContent = spData.volume;
          }
        }
      } catch (e) { /* non-critical */ }
    });
  } catch (e) {
    pollFailCount++;
    if (pollFailCount >= 5 && !reconnecting) {
      reconnecting = true;
      stopPolling();
      showToast('Lost connection to speaker. Trying to reconnect…', 'warning');
      tryReconnect();
    }
  }
}

async function tryReconnect() {
  const prevNames = selectedSpeakers.map(s => s.name);
  try {
    const data = await api('GET', '/api/discover');
    speakers = data.speakers || [];
    renderSpeakerList();
    updateSpeakerBar();
    // Try to reconnect to previously selected speakers
    if (prevNames.length > 0) {
      const matched = speakers.filter(s => prevNames.some(n => s.name === n || n.includes(s.name) || s.name.includes(n)));
      if (matched.length > 0) {
        selectedSpeakers = matched;
        updateSpeakerBar();
        renderSpeakerList();
        renderVolumeControls();
        pollFailCount = 0;
        reconnecting = false;
        showToast('Reconnected to ' + matched.map(s => s.name).join(', '), 'success');
        startPolling();
        return;
      }
    }
    if (speakers.length > 0) {
      selectedSpeakers = [speakers[0]];
      updateSpeakerBar();
      renderSpeakerList();
      renderVolumeControls();
      pollFailCount = 0;
      reconnecting = false;
      showToast('Reconnected to ' + speakers[0].name, 'success');
      startPolling();
    } else {
      showToast('No speakers found. Will retry…', 'warning');
      setTimeout(tryReconnect, 10000);
    }
  } catch (e) {
    showToast('Reconnect failed. Will retry…', 'warning');
    setTimeout(tryReconnect, 10000);
  }
}

function startPolling() {
  stopPolling();
  polling = true;
  pollNext();
}

function pollNext() {
  if (!polling) return;
  fetchStatus().finally(() => {
    if (polling) pollTimer = setTimeout(pollNext, 2000);
  });
}

function stopPolling() {
  polling = false;
  if (pollTimer) { clearTimeout(pollTimer); pollTimer = null; }
}

// ─── Parametric EQ ─────────────────────────────────────────────────────────
const eqCanvas = $('eqCanvas');
const eqCtx = eqCanvas.getContext('2d');
let eqBands = [];
let eqBypass = false;
let eqResponse = null; // { frequencies, composite, bands }
let eqDragging = -1;
let eqVisible = false;

const EQ_COLORS = ['#ff6b2b','#34d399','#60a5fa','#f472b6','#a78bfa','#fbbf24','#f87171','#2dd4bf'];
const EQ_FREQ_MIN = 20, EQ_FREQ_MAX = 20000;
const EQ_GAIN_MIN = -15, EQ_GAIN_MAX = 15;

function freqToX(f, w) {
  return (Math.log(f / EQ_FREQ_MIN) / Math.log(EQ_FREQ_MAX / EQ_FREQ_MIN)) * w;
}
function xToFreq(x, w) {
  return EQ_FREQ_MIN * Math.pow(EQ_FREQ_MAX / EQ_FREQ_MIN, x / w);
}
function gainToY(g, h) {
  return h / 2 - (g / EQ_GAIN_MAX) * (h / 2);
}
function yToGain(y, h) {
  return -((y - h / 2) / (h / 2)) * EQ_GAIN_MAX;
}

function toggleEqPanel() {
  eqVisible = !eqVisible;
  $('eqSection').style.display = eqVisible ? 'block' : 'none';
  if (eqVisible) loadEqState();
}

async function loadEqState() {
  try {
    const [state, resp] = await Promise.all([
      api('GET', '/api/eq'),
      api('GET', '/api/eq/response')
    ]);
    eqBands = state.bands || [];
    eqBypass = state.bypass || false;
    eqResponse = resp;
    updateEqBypassBtn();
    renderEqBandList();
    drawEq();
  } catch (e) { console.warn('EQ load failed:', e); }
}

async function refreshEqResponse() {
  try {
    eqResponse = await api('GET', '/api/eq/response');
    drawEq();
  } catch (_) {}
}

function updateEqBypassBtn() {
  const btn = $('btnEqBypass');
  if (eqBypass) {
    btn.textContent = 'OFF';
    btn.style.background = 'var(--surface)';
    btn.style.color = 'var(--text2)';
  } else {
    btn.textContent = 'ON';
    btn.style.background = 'var(--accent)';
    btn.style.color = '#fff';
  }
}

function renderEqBandList() {
  const el = $('eqBandList');
  el.innerHTML = eqBands.map((b, i) => {
    const color = EQ_COLORS[i % EQ_COLORS.length];
    const f = b.frequency >= 1000 ? (b.frequency / 1000).toFixed(1) + 'k' : Math.round(b.frequency);
    const g = (b.gain >= 0 ? '+' : '') + b.gain.toFixed(1);
    const opacity = b.enabled ? 1 : 0.4;
    return `<span data-eq-band="${i}" style="opacity:${opacity};padding:4px 8px;border-radius:6px;border:1px solid ${color};color:${color};cursor:pointer;user-select:none;font-size:11px;"
      onclick="openEqEdit(${i}, event)">${f}Hz ${g}dB Q${b.q.toFixed(1)} ${b.type}</span>`;
  }).join('');
}

function drawEq() {
  const dpr = window.devicePixelRatio || 1;
  const rect = eqCanvas.getBoundingClientRect();
  const w = rect.width * dpr;
  const h = rect.height * dpr;
  eqCanvas.width = w;
  eqCanvas.height = h;
  eqCtx.scale(dpr, dpr);
  const cw = rect.width, ch = rect.height;

  // Background
  eqCtx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--surface').trim();
  eqCtx.fillRect(0, 0, cw, ch);

  // Grid lines - frequency
  eqCtx.strokeStyle = 'rgba(255,255,255,0.06)';
  eqCtx.lineWidth = 0.5;
  [20,50,100,200,500,1000,2000,5000,10000,20000].forEach(f => {
    const x = freqToX(f, cw);
    eqCtx.beginPath(); eqCtx.moveTo(x, 0); eqCtx.lineTo(x, ch); eqCtx.stroke();
  });

  // Grid lines - gain
  for (let g = EQ_GAIN_MIN; g <= EQ_GAIN_MAX; g += 3) {
    const y = gainToY(g, ch);
    eqCtx.strokeStyle = g === 0 ? 'rgba(255,255,255,0.15)' : 'rgba(255,255,255,0.06)';
    eqCtx.beginPath(); eqCtx.moveTo(0, y); eqCtx.lineTo(cw, y); eqCtx.stroke();
  }

  // Grid labels - frequency
  eqCtx.fillStyle = 'rgba(255,255,255,0.2)';
  eqCtx.font = '9px sans-serif';
  eqCtx.textAlign = 'center';
  [{f:50,l:'50'},{f:100,l:'100'},{f:200,l:'200'},{f:500,l:'500'},{f:1000,l:'1k'},{f:2000,l:'2k'},{f:5000,l:'5k'},{f:10000,l:'10k'}].forEach(({f,l}) => {
    eqCtx.fillText(l, freqToX(f, cw), ch - 3);
  });

  // Grid labels - gain
  eqCtx.textAlign = 'left';
  [-12,-6,6,12].forEach(g => {
    eqCtx.fillText((g > 0 ? '+' : '') + g, 3, gainToY(g, ch) - 2);
  });

  if (!eqResponse || !eqResponse.frequencies) return;

  const freqs = eqResponse.frequencies;

  // Draw individual band curves (thin, colored)
  if (eqResponse.bands) {
    eqResponse.bands.forEach((curve, bi) => {
      if (!eqBands[bi] || !eqBands[bi].enabled) return;
      const color = EQ_COLORS[bi % EQ_COLORS.length];
      eqCtx.strokeStyle = color + '40';
      eqCtx.lineWidth = 1;
      eqCtx.beginPath();
      for (let i = 0; i < freqs.length; i++) {
        const x = freqToX(freqs[i], cw);
        const y = gainToY(curve[i], ch);
        i === 0 ? eqCtx.moveTo(x, y) : eqCtx.lineTo(x, y);
      }
      eqCtx.stroke();
    });
  }

  // Draw composite curve (bold, with gradient fill)
  const composite = eqResponse.composite;
  eqCtx.beginPath();
  for (let i = 0; i < freqs.length; i++) {
    const x = freqToX(freqs[i], cw);
    const y = gainToY(eqBypass ? 0 : composite[i], ch);
    i === 0 ? eqCtx.moveTo(x, y) : eqCtx.lineTo(x, y);
  }
  eqCtx.strokeStyle = eqBypass ? 'rgba(255,255,255,0.2)' : 'var(--accent)';
  eqCtx.lineWidth = 2;
  eqCtx.stroke();

  // Gradient fill under curve
  if (!eqBypass) {
    const lastX = freqToX(freqs[freqs.length - 1], cw);
    const zeroY = gainToY(0, ch);
    eqCtx.lineTo(lastX, zeroY);
    eqCtx.lineTo(freqToX(freqs[0], cw), zeroY);
    eqCtx.closePath();
    const grad = eqCtx.createLinearGradient(0, 0, 0, ch);
    grad.addColorStop(0, 'rgba(255,107,43,0.15)');
    grad.addColorStop(0.5, 'rgba(255,107,43,0.03)');
    grad.addColorStop(1, 'rgba(255,107,43,0.15)');
    eqCtx.fillStyle = grad;
    eqCtx.fill();
  }

  // Draw band control points
  eqBands.forEach((b, i) => {
    if (!b.enabled) return;
    const x = freqToX(b.frequency, cw);
    const y = gainToY(b.gain, ch);
    const color = EQ_COLORS[i % EQ_COLORS.length];
    const isDragging = (eqDragging === i);

    // Q width indicator (visible when dragging — shows bandwidth)
    if (isDragging) {
      // Approximate -3dB bandwidth in octaves ≈ 1/Q, draw as horizontal extent
      const octaves = 1.0 / Math.max(0.1, b.q);
      const fLow = b.frequency * Math.pow(2, -octaves / 2);
      const fHigh = b.frequency * Math.pow(2, octaves / 2);
      const xLow = freqToX(Math.max(EQ_FREQ_MIN, fLow), cw);
      const xHigh = freqToX(Math.min(EQ_FREQ_MAX, fHigh), cw);
      eqCtx.beginPath();
      eqCtx.moveTo(xLow, y);
      eqCtx.lineTo(xHigh, y);
      eqCtx.lineWidth = 3;
      eqCtx.strokeStyle = color + '80';
      eqCtx.stroke();
      // End caps
      eqCtx.beginPath();
      eqCtx.arc(xLow, y, 3, 0, Math.PI * 2);
      eqCtx.arc(xHigh, y, 3, 0, Math.PI * 2);
      eqCtx.fillStyle = color + '80';
      eqCtx.fill();
    }

    // Outer glow (larger when dragging)
    eqCtx.beginPath();
    eqCtx.arc(x, y, isDragging ? 16 : 12, 0, Math.PI * 2);
    eqCtx.fillStyle = color + (isDragging ? '40' : '20');
    eqCtx.fill();

    // Inner dot (larger when dragging for better visibility)
    eqCtx.beginPath();
    eqCtx.arc(x, y, isDragging ? 7 : 5, 0, Math.PI * 2);
    eqCtx.fillStyle = color;
    eqCtx.fill();

    // White ring if dragging
    if (isDragging) {
      eqCtx.strokeStyle = '#fff';
      eqCtx.lineWidth = 2;
      eqCtx.stroke();
    }
  });
}

// ── EQ Touch/Mouse Interaction ──
function eqPointerPos(e) {
  const rect = eqCanvas.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  return { x: t.clientX - rect.left, y: t.clientY - rect.top, w: rect.width, h: rect.height };
}

function eqFindBand(px, py, w, h) {
  let closest = -1, closestDist = 30;
  eqBands.forEach((b, i) => {
    if (!b.enabled) return;
    const bx = freqToX(b.frequency, w);
    const by = gainToY(b.gain, h);
    const d = Math.sqrt((px - bx) ** 2 + (py - by) ** 2);
    if (d < closestDist) { closest = i; closestDist = d; }
  });
  return closest;
}

let eqUpdateTimeout = null;
let eqApplyTimeout = null;
let eqEditBand = -1; // which band is being edited in popup

// For Sonos: EQ changes are live once the EQ stream is established, but the
// first activation (switching from original file to EQ stream) requires a
// re-send with a cache-busting URL so Sonos re-fetches. For local playback:
// EQ changes are always live (~10ms latency), no re-send needed.

/** Re-send current track to Sonos with cache-busting URL when EQ becomes active. */
async function applyEqToSpeaker() {
  if (!currentFile || !selectedSpeakers.length) return;
  const sonos = sonosSpeakers();
  if (!sonos.length) return;
  try {
    if (sonos.length > 1) {
      await api('POST', '/api/play-multi', { speakers: sonos.map(s => s.name), file: currentFile });
    } else {
      await api('POST', '/api/play', { speaker: sonos[0].name, file: currentFile });
    }
  } catch (e) {
    showToast('EQ apply failed: ' + e.message, 'error');
  }
}

function scheduleEqApply() {
  // Only re-send to Sonos speakers (local playback picks up EQ changes live)
  if (!sonosSpeakers().length) return;
  clearTimeout(eqApplyTimeout);
  eqApplyTimeout = setTimeout(applyEqToSpeaker, 1500);
}

function sendBandUpdate(bandIndex) {
  clearTimeout(eqUpdateTimeout);
  eqUpdateTimeout = setTimeout(() => {
    api('POST', '/api/eq/band', {
      action: 'update', index: bandIndex,
      frequency: eqBands[bandIndex].frequency,
      gain: eqBands[bandIndex].gain,
      q: eqBands[bandIndex].q,
      type: eqBands[bandIndex].type,
      enabled: eqBands[bandIndex].enabled
    }).then(() => refreshEqResponse())
      .catch(err => showToast('EQ update failed: ' + err.message, 'error'));
  }, 100);
  scheduleEqApply();
}

function eqDragUpdate(bandIndex, freq, gain, q) {
  if (freq !== undefined) {
    freq = Math.max(EQ_FREQ_MIN, Math.min(EQ_FREQ_MAX, freq));
    eqBands[bandIndex].frequency = Math.round(freq);
  }
  if (gain !== undefined) {
    gain = Math.max(EQ_GAIN_MIN, Math.min(EQ_GAIN_MAX, gain));
    eqBands[bandIndex].gain = Math.round(gain * 10) / 10;
  }
  if (q !== undefined) {
    eqBands[bandIndex].q = Math.round(Math.max(0.1, Math.min(18.0, q)) * 10) / 10;
  }
  drawEq();
  renderEqBandList();
  sendBandUpdate(bandIndex);
  showDragLabel();
}

// ── Multi-touch: drag for freq/gain, pinch for Q ──
// Standard pro-EQ interaction: one finger drags the band node,
// second finger pinch adjusts Q (spread = wide/low Q, pinch = narrow/high Q)

const EQ_TAP_THRESHOLD = 8;
const eqPointers = new Map();     // pointerId → {x, y}
let eqDragMoved = false;
let eqDragStartX = 0, eqDragStartY = 0;
let eqPrimaryPointerId = -1;      // first finger (controls drag)
let eqPinchMode = false;
let eqPinchRefDist = 0;           // finger distance when pinch started
let eqPinchRefQ = 1.0;            // Q value when pinch started

function getPointerDist() {
  if (eqPointers.size < 2) return 0;
  const pts = [...eqPointers.values()];
  const dx = pts[0].x - pts[1].x, dy = pts[0].y - pts[1].y;
  return Math.sqrt(dx * dx + dy * dy);
}

function showDragLabel() {
  if (eqDragging < 0) { $('eqDragLabel').style.display = 'none'; return; }
  const b = eqBands[eqDragging];
  const rect = eqCanvas.getBoundingClientRect();
  const bx = freqToX(b.frequency, rect.width);
  const by = gainToY(b.gain, rect.height);
  const label = $('eqDragLabel');
  const f = b.frequency >= 1000 ? (b.frequency / 1000).toFixed(1) + 'k' : Math.round(b.frequency);
  const g = (b.gain >= 0 ? '+' : '') + b.gain.toFixed(1);
  label.textContent = `${f}Hz  ${g}dB  Q${b.q.toFixed(1)}`;
  label.style.display = 'block';
  label.style.left = (rect.left + bx - label.offsetWidth / 2) + 'px';
  label.style.top = (rect.top + by - 32) + 'px';
}

function hideDragLabel() { $('eqDragLabel').style.display = 'none'; }

eqCanvas.addEventListener('pointerdown', e => {
  const { x, y, w, h } = eqPointerPos(e);
  eqPointers.set(e.pointerId, { x, y });
  eqCanvas.setPointerCapture(e.pointerId);

  if (eqDragging < 0) {
    // First finger — find and start dragging a band
    eqDragging = eqFindBand(x, y, w, h);
    eqDragMoved = false;
    eqDragStartX = x;
    eqDragStartY = y;
    eqPrimaryPointerId = e.pointerId;
    if (eqDragging >= 0) drawEq();
  } else if (eqPointers.size === 2 && !eqPinchMode) {
    // Second finger while dragging — enter pinch mode for Q
    eqPinchMode = true;
    eqPinchRefDist = getPointerDist();
    eqPinchRefQ = eqBands[eqDragging].q;
    eqDragMoved = true; // prevent tap-to-popup
  }
});

eqCanvas.addEventListener('pointermove', e => {
  if (!eqPointers.has(e.pointerId)) return;
  const { x, y, w, h } = eqPointerPos(e);
  eqPointers.set(e.pointerId, { x, y });

  if (eqDragging < 0) return;

  if (eqPinchMode && eqPointers.size >= 2) {
    // Pinch mode — adjust Q based on finger distance
    const dist = getPointerDist();
    if (eqPinchRefDist > 10) {
      const ratio = eqPinchRefDist / dist;
      const newQ = eqPinchRefQ * ratio;
      eqDragUpdate(eqDragging, undefined, undefined, newQ);
    }
    // Also allow primary finger to keep moving freq/gain
    if (e.pointerId === eqPrimaryPointerId) {
      eqDragUpdate(eqDragging, xToFreq(x, w), yToGain(y, h), undefined);
    }
  } else {
    // Single finger drag — freq/gain
    const dx = x - eqDragStartX, dy = y - eqDragStartY;
    if (!eqDragMoved && Math.sqrt(dx * dx + dy * dy) < EQ_TAP_THRESHOLD) return;
    eqDragMoved = true;
    eqDragUpdate(eqDragging, xToFreq(x, w), yToGain(y, h));
  }
});

eqCanvas.addEventListener('pointerup', e => {
  eqPointers.delete(e.pointerId);

  if (eqPinchMode && eqPointers.size < 2) {
    // Released second finger — exit pinch, keep dragging with remaining finger
    eqPinchMode = false;
  }

  if (eqPointers.size === 0) {
    // All fingers released
    const band = eqDragging;
    eqDragging = -1;
    eqPrimaryPointerId = -1;
    hideDragLabel();
    drawEq();
    if (!eqDragMoved && band >= 0) {
      openEqEdit(band, e);
    }
  }
});

eqCanvas.addEventListener('pointercancel', e => {
  eqPointers.delete(e.pointerId);
  if (eqPointers.size === 0) {
    eqDragging = -1;
    eqPrimaryPointerId = -1;
    eqPinchMode = false;
    hideDragLabel();
    drawEq();
  }
});

// ── Band Edit Popup ──
function openEqEdit(bandIndex, pointerEvent) {
  eqEditBand = bandIndex;
  const b = eqBands[bandIndex];
  const color = EQ_COLORS[bandIndex % EQ_COLORS.length];
  $('eqEditTitle').textContent = `Band ${bandIndex + 1}`;
  $('eqEditTitle').style.color = color;

  // Set slider values (freq uses log scale mapped to 20-20000)
  $('eqEditFreq').value = Math.round(Math.log(b.frequency / 20) / Math.log(1000) * 1000);
  $('eqEditFreq').min = 0;
  $('eqEditFreq').max = 1000;
  $('eqEditFreqLabel').textContent = fmtFreq(b.frequency);
  $('eqEditGain').value = Math.round(b.gain * 10);
  $('eqEditGainLabel').textContent = (b.gain >= 0 ? '+' : '') + b.gain.toFixed(1) + ' dB';
  $('eqEditQ').value = Math.round(b.q * 10);
  $('eqEditQLabel').textContent = b.q.toFixed(1);
  $('eqEditType').value = b.type;
  $('eqEditToggle').textContent = b.enabled ? 'On' : 'Off';
  $('eqEditToggle').style.color = b.enabled ? '#34d399' : '#f87171';

  // Position popup near the canvas
  const popup = $('eqEditPopup');
  const canvasRect = eqCanvas.getBoundingClientRect();
  popup.style.left = Math.max(8, Math.min(window.innerWidth - 270, canvasRect.left)) + 'px';
  popup.style.top = (canvasRect.bottom + 8) + 'px';
  popup.style.display = 'block';
}

function closeEqEdit() {
  $('eqEditPopup').style.display = 'none';
  eqEditBand = -1;
}

function toggleEditingBand() {
  if (eqEditBand < 0) return;
  eqBands[eqEditBand].enabled = !eqBands[eqEditBand].enabled;
  $('eqEditToggle').textContent = eqBands[eqEditBand].enabled ? 'On' : 'Off';
  $('eqEditToggle').style.color = eqBands[eqEditBand].enabled ? '#34d399' : '#f87171';
  drawEq(); renderEqBandList(); sendBandUpdate(eqEditBand);
}

function removeEditingBand() {
  if (eqEditBand < 0) return;
  closeEqEdit();
  api('POST', '/api/eq/band', { action: 'remove', index: eqEditBand }).then(() => loadEqState());
}

function fmtFreq(f) {
  return f >= 1000 ? (f / 1000).toFixed(1) + ' kHz' : Math.round(f) + ' Hz';
}

// Popup slider events
$('eqEditFreq').addEventListener('input', e => {
  if (eqEditBand < 0) return;
  // Log scale: slider 0-1000 maps to 20-20000 Hz
  const freq = Math.round(20 * Math.pow(1000, +e.target.value / 1000));
  eqBands[eqEditBand].frequency = freq;
  $('eqEditFreqLabel').textContent = fmtFreq(freq);
  drawEq(); renderEqBandList(); sendBandUpdate(eqEditBand);
});

$('eqEditGain').addEventListener('input', e => {
  if (eqEditBand < 0) return;
  const gain = +e.target.value / 10;
  eqBands[eqEditBand].gain = gain;
  $('eqEditGainLabel').textContent = (gain >= 0 ? '+' : '') + gain.toFixed(1) + ' dB';
  drawEq(); renderEqBandList(); sendBandUpdate(eqEditBand);
});

$('eqEditQ').addEventListener('input', e => {
  if (eqEditBand < 0) return;
  const q = +e.target.value / 10;
  eqBands[eqEditBand].q = q;
  $('eqEditQLabel').textContent = q.toFixed(1);
  drawEq(); renderEqBandList(); sendBandUpdate(eqEditBand);
});

$('eqEditType').addEventListener('change', e => {
  if (eqEditBand < 0) return;
  eqBands[eqEditBand].type = e.target.value;
  drawEq(); renderEqBandList(); sendBandUpdate(eqEditBand);
});

// Close popup when tapping outside
document.addEventListener('pointerdown', e => {
  const popup = $('eqEditPopup');
  if (popup.style.display === 'block' && !popup.contains(e.target) && e.target !== eqCanvas) {
    closeEqEdit();
  }
});

// ── EQ Button Handlers ──
$('btnEqBypass').addEventListener('click', async () => {
  eqBypass = !eqBypass;
  updateEqBypassBtn();
  drawEq();
  await api('POST', '/api/eq/bypass', { bypass: eqBypass });
  scheduleEqApply();
});

$('btnEqAdd').addEventListener('click', async () => {
  if (eqBands.length >= 8) { showToast('Max 8 bands', 'warning'); return; }
  await api('POST', '/api/eq/band', { action: 'add', frequency: 1000, gain: 0, q: 1, type: 'BELL', enabled: true });
  await loadEqState();
});

$('btnEqReset').addEventListener('click', async () => {
  await api('POST', '/api/eq/reset');
  await loadEqState();
  scheduleEqApply();
});

async function toggleEqBand(i) {
  eqBands[i].enabled = !eqBands[i].enabled;
  renderEqBandList();
  await api('POST', '/api/eq/band', { action: 'update', index: i, ...eqBands[i] });
  await refreshEqResponse();
  scheduleEqApply();
}

async function removeEqBand(i) {
  await api('POST', '/api/eq/band', { action: 'remove', index: i });
  await loadEqState();
  scheduleEqApply();
}

document.querySelector('.logo').addEventListener('touchstart', () => {

// Also support mouse long-press for desktop testing
document.querySelector('.logo').addEventListener('mousedown', () => {
  debugLongPress = setTimeout(() => {
    $('debugPanel').style.display = 'block';

async function refreshDebugLogs() {
  try {
    const data = await api('GET', '/api/debug');
    let content = '=== SPEAKERS ===\n';
    if (data.speakers) {
      data.speakers.forEach(sp => {
        content += `${sp.name}\n  ip=${sp.ip}:${sp.port}\n  controlUrl=${sp.controlUrl}\n  renderingUrl=${sp.renderingUrl}\n  uuid=${sp.uuid}\n\n`;
      });
    }
    content += `\n=== DISCOVERY ===\n${data.diagnostics || 'none'}\n`;
    content += `\n=== SOAP LOGS (recent) ===\n`;
    if (data.soap_logs && data.soap_logs.length) {
      data.soap_logs.forEach(l => { content += l + '\n'; });
    } else {
      content += '(no SOAP calls logged yet)\n';
    }
    content += `\n=== EQ STREAM LOG ===\n`;
    content += `EQ active: ${data.eq_active}, bands: ${data.eq_bands}, version: ${data.eq_version}\n`;
    if (data.eq_log && data.eq_log.length) {
      data.eq_log.forEach(l => { content += l + '\n'; });
    } else {
      content += '(no EQ stream activity yet)\n';
    }
    content += `\n=== UI STATE ===\n`;
    content += `selectedSpeakers: ${JSON.stringify(selectedSpeakers.map(s => ({name:s.name,ip:s.ip})))}\n`;
    content += `isPlaying: ${isPlaying}\n`;
    content += `currentFile: ${currentFile || 'none'}\n`;
    content += `pollFailCount: ${pollFailCount}\n`;
    $('debugContent').textContent = content;
  } catch (e) {
    $('debugContent').textContent = 'Error fetching debug info: ' + e.message;
  }
}

// ─── Init ───────────────────────────────────────────────────────────────────
// ─── OTA Update ────────────────────────────────────────────────────────────
let pendingApkUrl = null;

async function checkForUpdate() {
  try {
    const data = await api('GET', '/api/check-update');
    if (data.available) {
      pendingApkUrl = data.apk_url;
      $('updateVersion').textContent = 'v' + data.new_version;
      $('updateBanner').classList.add('visible');
    }
  } catch (e) {
    console.warn('Update check failed:', e.message);
    showToast('Update check: ' + e.message, 'warning');
  }
}

$('updateBanner').addEventListener('click', () => {
  if (!pendingApkUrl) return;
  if (typeof window.NativeUpdate !== 'undefined') {
    $('updateAction').textContent = ' — Downloading…';
    $('updateProgress').style.display = 'block';
    window.NativeUpdate.downloadAndInstall(pendingApkUrl);
  } else {
    // Fallback: open URL in browser
    window.open(pendingApkUrl, '_blank');
  }
});

// Progress callback from native bridge
window._updateProgress = function(pct) {
  $('updateProgressFill').style.width = pct + '%';
  if (pct >= 100) $('updateAction').textContent = ' — Installing…';
};

// ─── Player Bar Resizer (tablet only) ──────────────────────────────────────
(function initResizer() {
  const resizer = $('resizer');
  const playerBar = $('playerBar');
  if (!resizer || !playerBar) return;

  const MIN_WIDTH = 280;
  const MAX_WIDTH = 720;
  const STORAGE_KEY = 'playerBarWidth';

  // Restore saved width (only applies in tablet mode via inline style override)
  const saved = parseInt(localStorage.getItem(STORAGE_KEY) || '', 10);
  if (saved >= MIN_WIDTH && saved <= MAX_WIDTH) {
    playerBar.style.width = saved + 'px';
  }

  let dragging = false;
  let startX = 0;
  let startWidth = 340;

  resizer.addEventListener('pointerdown', e => {
    // Only engage in tablet layout
    if (window.innerWidth < 768) return;
    dragging = true;
    startX = e.clientX;
    startWidth = playerBar.offsetWidth;
    resizer.classList.add('dragging');
    resizer.setPointerCapture(e.pointerId);
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  resizer.addEventListener('pointermove', e => {
    if (!dragging) return;
    const dx = startX - e.clientX; // drag LEFT = widen player
    let newWidth = startWidth + dx;
    newWidth = Math.max(MIN_WIDTH, Math.min(MAX_WIDTH, newWidth));
    playerBar.style.width = newWidth + 'px';
    // Nudge the EQ canvas so it redraws at the new width
    if (typeof drawEq === 'function') drawEq();
  });

  const endDrag = e => {
    if (!dragging) return;
    dragging = false;
    resizer.classList.remove('dragging');
    try { resizer.releasePointerCapture(e.pointerId); } catch (_) {}
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    localStorage.setItem(STORAGE_KEY, playerBar.offsetWidth.toString());
  };
  resizer.addEventListener('pointerup', endDrag);
  resizer.addEventListener('pointercancel', endDrag);
})();

// ─── Init ───────────────────────────────────────────────────────────────────
(async function init() {
  // Auto-discover speakers on first launch (not just load empty list)
  await rescanSpeakers();
  await loadFiles();
  if (selectedSpeakers.length) startPolling();
  // Check for updates after UI is loaded (non-blocking)
  setTimeout(checkForUpdate, 3000);
})();
