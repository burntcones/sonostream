<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Sonos Streamer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --surface2: #1c1c1c;
  --border: #262626;
  --text: #e8e8e8;
  --text2: #888;
  --accent: #ff6b2b;
  --accent2: #ff8f5e;
  --green: #34d399;
  --radius: 14px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html, body {
  font-family: 'DM Sans', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100%;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  -webkit-font-smoothing: antialiased;
}

/* ── Layout ── */
.app {
  display: flex;
  flex-direction: column;
  height: 100%;
  max-width: 500px;
  margin: 0 auto;
}

.header {
  padding: 16px 20px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-icon {
  width: 32px;
  height: 32px;
  background: var(--accent);
  border-radius: 8px;
  display: grid;
  place-items: center;
}

.logo-icon svg { width: 18px; height: 18px; }

.logo h1 {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.3px;
}

.logo h1 span { color: var(--text2); font-weight: 300; }

.btn-icon {
  width: 40px;
  height: 40px;
  border: none;
  background: var(--surface);
  border-radius: 10px;
  color: var(--text2);
  display: grid;
  place-items: center;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-icon:active { transform: scale(0.92); background: var(--surface2); }
.btn-icon.active { color: var(--accent); }
.btn-icon svg { width: 20px; height: 20px; }

/* ── Speaker Picker ── */
.speaker-bar {
  padding: 0 20px 12px;
  flex-shrink: 0;
}

.speaker-select {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: border-color 0.15s;
}

.speaker-select:active { border-color: var(--accent); }

.speaker-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--text2);
  flex-shrink: 0;
}

.speaker-dot.connected { background: var(--green); }

.speaker-name {
  flex: 1;
  font-size: 14px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.speaker-model {
  font-size: 12px;
  color: var(--text2);
}

.speaker-chevron { color: var(--text2); flex-shrink: 0; }

/* ── Speaker Sheet ── */
.sheet-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}

.sheet-overlay.open { opacity: 1; pointer-events: auto; }

.sheet {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  max-width: 500px;
  margin: 0 auto;
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  z-index: 101;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
  max-height: 60vh;
  overflow-y: auto;
  padding-bottom: var(--safe-bottom);
}

.sheet.open { transform: translateY(0); }

.sheet-handle {
  width: 36px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 10px auto 0;
}

.sheet-title {
  padding: 16px 20px 8px;
  font-size: 16px;
  font-weight: 700;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.sheet-title button {
  font-size: 12px;
  padding: 6px 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--accent);
  font-family: inherit;
  font-weight: 500;
  cursor: pointer;
}

.sheet-title button:active { opacity: 0.7; }

.speaker-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 20px;
  cursor: pointer;
  transition: background 0.1s;
}

.speaker-item:active { background: var(--surface2); }
.speaker-item.selected { background: var(--surface2); }

.speaker-item .sp-icon {
  width: 40px; height: 40px;
  background: var(--surface2);
  border-radius: 10px;
  display: grid;
  place-items: center;
  color: var(--text2);
}

.speaker-item.selected .sp-icon { background: var(--accent); color: #fff; }

.speaker-item .sp-info { flex: 1; }
.speaker-item .sp-info .sp-name { font-size: 14px; font-weight: 500; }
.speaker-item .sp-info .sp-model { font-size: 12px; color: var(--text2); }

.speaker-item .sp-check { color: var(--accent); opacity: 0; }
.speaker-item.selected .sp-check { opacity: 1; }

.empty-state {
  padding: 30px 20px;
  text-align: center;
  color: var(--text2);
  font-size: 14px;
}

/* ── File List ── */
.file-area {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: calc(200px + var(--safe-bottom));
}

.search-bar {
  padding: 0 20px 10px;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 10;
}

.search-input {
  width: 100%;
  padding: 10px 14px 10px 38px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  outline: none;
  transition: border-color 0.15s;
}

.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text2); }

.search-icon {
  position: absolute;
  left: 32px;
  top: 50%;
  transform: translateY(calc(-50% - 5px));
  color: var(--text2);
  pointer-events: none;
}

.sort-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 20px 8px;
}

.sort-btn {
  font-family: inherit;
  font-size: 11px;
  font-weight: 600;
  padding: 5px 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
}

.sort-btn.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

.sort-btn:active { transform: scale(0.95); }

.file-count {
  margin-left: auto;
  font-size: 11px;
  color: var(--text2);
}

.folder-header {
  padding: 8px 20px 4px;
  font-size: 11px;
  font-weight: 700;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  position: sticky;
  top: 46px;
  background: var(--bg);
  z-index: 5;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  user-select: none;
}

.folder-header .folder-chevron {
  transition: transform 0.2s;
  color: var(--text2);
}

.folder-header.collapsed .folder-chevron {
  transform: rotate(-90deg);
}

.folder-contents.collapsed {
  display: none;
}

.file-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 20px;
  cursor: pointer;
  transition: background 0.1s;
}

.file-item:active { background: var(--surface); }
.file-item.playing { background: var(--surface); }

.file-icon {
  width: 44px; height: 44px;
  background: var(--surface);
  border-radius: 10px;
  display: grid;
  place-items: center;
  flex-shrink: 0;
  color: var(--text2);
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
}

.file-item.playing .file-icon {
  background: var(--accent);
  color: #fff;
}

.file-info { flex: 1; min-width: 0; }

.file-name {
  font-size: 14px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.file-meta {
  font-size: 12px;
  color: var(--text2);
  margin-top: 2px;
}

.file-action {
  flex-shrink: 0;
  color: var(--text2);
  opacity: 0.5;
}

.file-item.playing .file-action { color: var(--accent); opacity: 1; }

/* ── Now Playing Bar ── */
.player-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  max-width: 500px;
  margin: 0 auto;
  z-index: 50;
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
  padding-bottom: var(--safe-bottom);
}

.player-bar.visible { transform: translateY(0); }

.player-inner {
  background: var(--surface);
  border-top: 1px solid var(--border);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

.player-progress {
  height: 3px;
  background: var(--border);
  position: relative;
  cursor: pointer;
}

.player-progress-fill {
  height: 100%;
  background: var(--accent);
  width: 0%;
  transition: width 0.5s linear;
}

.player-track {
  padding: 12px 20px 4px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.player-track-info { flex: 1; min-width: 0; }

.player-track-name {
  font-size: 14px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.player-track-time {
  font-size: 11px;
  color: var(--text2);
  font-variant-numeric: tabular-nums;
}

.player-controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: 8px 20px 12px;
}

.ctrl-btn {
  width: 44px; height: 44px;
  border: none;
  background: none;
  color: var(--text);
  display: grid;
  place-items: center;
  cursor: pointer;
  border-radius: 50%;
  transition: all 0.12s;
}

.ctrl-btn:active { transform: scale(0.88); opacity: 0.7; }
.ctrl-btn svg { width: 22px; height: 22px; }

.ctrl-btn.play-pause {
  width: 52px; height: 52px;
  background: var(--accent);
  color: #fff;
}

.ctrl-btn.play-pause svg { width: 26px; height: 26px; }

.volume-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 20px 14px;
}

.volume-row svg { width: 16px; height: 16px; color: var(--text2); flex-shrink: 0; }

.volume-slider {
  flex: 1;
  -webkit-appearance: none;
  appearance: none;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  outline: none;
}

.volume-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px; height: 18px;
  background: var(--text);
  border-radius: 50%;
  cursor: pointer;
}

/* ── Loading / Scanning ── */
.scanning {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  font-size: 12px;
  color: var(--accent);
}

@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
  width: 14px; height: 14px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}

/* ── Toast Notifications ── */
.toast-container {
  position: fixed;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 200;
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-width: 460px;
  width: calc(100% - 40px);
  pointer-events: none;
}

.toast {
  padding: 12px 16px;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 500;
  line-height: 1.4;
  pointer-events: auto;
  animation: toastIn 0.3s cubic-bezier(0.32, 0.72, 0, 1), toastOut 0.3s 3s forwards;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

.toast.error {
  background: rgba(220, 38, 38, 0.9);
  color: #fff;
}

.toast.warning {
  background: rgba(245, 158, 11, 0.9);
  color: #000;
}

.toast.info {
  background: rgba(59, 130, 246, 0.85);
  color: #fff;
}

.toast.success {
  background: rgba(52, 211, 153, 0.9);
  color: #000;
}

@keyframes toastIn {
  from { opacity: 0; transform: translateY(-12px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

@keyframes toastOut {
  from { opacity: 1; }
  to { opacity: 0; transform: translateY(-8px); pointer-events: none; }
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 0; }

/* ── Pulse animation for playing ── */
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}
.playing-pulse { animation: pulse 1.5s ease-in-out infinite; }
</style>
</head>
<body>
<div class="toast-container" id="toastContainer"></div>
<div class="app" id="app">

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round">
          <path d="M12 3v18M8 7a4 4 0 0 1 8 0M5 10a7 7 0 0 1 14 0M2 13a10 10 0 0 1 20 0"/>
        </svg>
      </div>
      <h1>SonoStream <span>Local</span></h1>
    </div>
    <button class="btn-icon" id="btnRefreshFiles" title="Refresh files">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16"/>
      </svg>
    </button>
  </div>

  <!-- Speaker Picker -->
  <div class="speaker-bar">
    <div class="speaker-select" id="speakerToggle">
      <div class="speaker-dot" id="speakerDot"></div>
      <div class="speaker-name" id="speakerLabel">Select Speaker…</div>
      <div class="speaker-model" id="speakerModel"></div>
      <div class="speaker-chevron">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
      </div>
    </div>
  </div>

  <!-- File List -->
  <div class="file-area" id="fileArea">
    <div class="search-bar" style="position:relative">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
      <input class="search-input" id="searchInput" type="text" placeholder="Search files…">
    </div>
    <div class="sort-bar">
      <button class="sort-btn active" data-sort="name">Name</button>
      <button class="sort-btn" data-sort="size">Size</button>
      <button class="sort-btn" data-sort="folder">Folder</button>
      <span class="file-count" id="fileCount"></span>
    </div>
    <div id="fileList"></div>
  </div>

  <!-- Player Bar -->
  <div class="player-bar" id="playerBar">
    <div class="player-inner">
      <div class="player-progress" id="progressBar">
        <div class="player-progress-fill" id="progressFill"></div>
      </div>
      <div class="player-track">
        <div class="player-track-info">
          <div class="player-track-name" id="trackName">—</div>
          <div class="player-track-time"><span id="trackPos">0:00</span> / <span id="trackDur">0:00</span> · <span id="queuePos"></span></div>
        </div>
      </div>
      <div class="player-controls">
        <button class="ctrl-btn" id="btnPrev">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>
        <button class="ctrl-btn play-pause" id="btnPlayPause">
          <svg viewBox="0 0 24 24" fill="currentColor" id="iconPlay"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="ctrl-btn" id="btnNext">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 18h2V6h-2zM6 18l8.5-6L6 6z"/></svg>
        </button>
        <button class="ctrl-btn" id="btnStop">
          <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
        </button>
      </div>
      <div class="volume-row">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5z"/></svg>
        <input class="volume-slider" id="volumeSlider" type="range" min="0" max="100" value="50">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5zM19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
      </div>
    </div>
  </div>

  <!-- Speaker Sheet -->
  <div class="sheet-overlay" id="sheetOverlay"></div>
  <div class="sheet" id="speakerSheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">
      Speakers
      <button id="btnRescan">Rescan</button>
    </div>
    <div id="speakerList"></div>
  </div>

</div>

<script>
// ─── State ──────────────────────────────────────────────────────────────────
let speakers = [];
let files = [];
let selectedSpeaker = null;
let currentFile = null;
let isPlaying = false;
let pollTimer = null;
let queue = [];
let queueIndex = -1;
let lastPlayState = null;
let autoAdvancing = false;
let sortMode = 'name';
let collapsedFolders = new Set();

const $ = id => document.getElementById(id);

// ─── Toast Notifications ───────────────────────────────────────────────────
function showToast(message, type = 'error') {
  const container = $('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(() => { if (toast.parentNode) toast.remove(); }, 3500);
}

// ─── API ────────────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    throw new Error(err.error || `Request failed (${r.status})`);
  }
  return r.json();
}

// ─── Speakers ───────────────────────────────────────────────────────────────
async function loadSpeakers() {
  try {
    const data = await api('GET', '/api/speakers');
    speakers = data.speakers || [];
    renderSpeakerList();
    if (speakers.length === 1 && !selectedSpeaker) selectSpeaker(speakers[0]);
    updateSpeakerBar();
  } catch (e) {
    showToast('Could not load speakers. Check WiFi connection.', 'error');
  }
}

async function rescanSpeakers() {
  $('btnRescan').textContent = 'Scanning…';
  try {
    const data = await api('GET', '/api/discover');
    speakers = data.speakers || [];
    renderSpeakerList();
    if (speakers.length === 1 && !selectedSpeaker) selectSpeaker(speakers[0]);
    updateSpeakerBar();
    if (!speakers.length) showToast('No speakers found. Check WiFi and try again.', 'warning');
    else showToast(`Found ${speakers.length} speaker${speakers.length > 1 ? 's' : ''}`, 'success');
  } catch (e) {
    showToast('Network scan failed. Check WiFi connection.', 'error');
  } finally {
    $('btnRescan').textContent = 'Rescan';
  }
}

function selectSpeaker(sp) {
  selectedSpeaker = sp;
  updateSpeakerBar();
  closeSheet();
  // Get current volume
  if (sp) fetchStatus();
}

function updateSpeakerBar() {
  if (selectedSpeaker) {
    $('speakerLabel').textContent = selectedSpeaker.name;
    $('speakerModel').textContent = selectedSpeaker.model;
    $('speakerDot').classList.add('connected');
  } else {
    $('speakerLabel').textContent = speakers.length ? 'Select Speaker…' : 'No speakers found';
    $('speakerModel').textContent = '';
    $('speakerDot').classList.remove('connected');
  }
}

function renderSpeakerList() {
  const el = $('speakerList');
  if (!speakers.length) {
    el.innerHTML = '<div class="empty-state">No Sonos speakers found on your network.<br>Make sure you\'re on the same WiFi.</div>';
    return;
  }
  el.innerHTML = speakers.map(sp => {
    const memberCount = sp.group_members ? sp.group_members.length : 0;
    const groupBadge = memberCount > 1 ? `<span style="background:var(--accent);color:#fff;font-size:10px;padding:2px 6px;border-radius:6px;margin-left:6px;">${memberCount} speakers</span>` : '';
    return `
    <div class="speaker-item ${selectedSpeaker?.name === sp.name ? 'selected' : ''}" data-name="${sp.name}">
      <div class="sp-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v18M8 7a4 4 0 0 1 8 0M5 10a7 7 0 0 1 14 0"/></svg>
      </div>
      <div class="sp-info">
        <div class="sp-name">${sp.name}${groupBadge}</div>
        <div class="sp-model">${sp.model} · ${sp.ip}</div>
      </div>
      <div class="sp-check">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>
      </div>
    </div>`;
  }).join('');

  el.querySelectorAll('.speaker-item').forEach(item => {
    item.addEventListener('click', () => {
      const sp = speakers.find(s => s.name === item.dataset.name);
      if (sp) selectSpeaker(sp);
    });
  });
}

// ─── Sheet ──────────────────────────────────────────────────────────────────
function openSheet() {
  $('sheetOverlay').classList.add('open');
  $('speakerSheet').classList.add('open');
}
function closeSheet() {
  $('sheetOverlay').classList.remove('open');
  $('speakerSheet').classList.remove('open');
}

$('speakerToggle').addEventListener('click', openSheet);
$('sheetOverlay').addEventListener('click', closeSheet);
$('btnRescan').addEventListener('click', rescanSpeakers);

// ─── Files ──────────────────────────────────────────────────────────────────
async function loadFiles() {
  try {
    const data = await api('GET', '/api/files');
    files = data.files || [];
    renderFiles();
    if (!files.length) showToast('No audio files found on this device.', 'warning');
  } catch (e) {
    showToast('Could not load audio files.', 'error');
  }
}

function renderFiles(filter = '') {
  const el = $('fileList');
  const q = filter.toLowerCase();
  let filtered = q ? files.filter(f => f.name.toLowerCase().includes(q) || f.path.toLowerCase().includes(q)) : [...files];

  // Update file count
  $('fileCount').textContent = `${filtered.length} file${filtered.length !== 1 ? 's' : ''}`;

  if (!filtered.length) {
    el.innerHTML = `<div class="empty-state">${files.length
      ? 'No matches found'
      : 'No audio files found on this device.<br>Copy music files to your phone to get started.'}</div>`;
    return;
  }

  // Sort
  if (sortMode === 'name') {
    filtered.sort((a, b) => a.name.localeCompare(b.name));
  } else if (sortMode === 'size') {
    filtered.sort((a, b) => b.size - a.size);
  }
  // 'folder' keeps default grouping order

  // Group by directory
  const groups = {};
  filtered.forEach(f => {
    const dir = f.dir || 'Root';
    (groups[dir] = groups[dir] || []).push(f);
  });

  let html = '';
  for (const [dir, items] of Object.entries(groups)) {
    const isCollapsed = collapsedFolders.has(dir);
    html += `<div class="folder-header ${isCollapsed ? 'collapsed' : ''}" data-folder="${dir}">
      <span>${dir} (${items.length})</span>
      <svg class="folder-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
    </div>`;
    html += `<div class="folder-contents ${isCollapsed ? 'collapsed' : ''}" data-folder-content="${dir}">`;
    items.forEach(f => {
      const playing = currentFile === f.path;
      const size = f.size > 1048576 ? (f.size / 1048576).toFixed(1) + ' MB' : (f.size / 1024).toFixed(0) + ' KB';
      html += `
        <div class="file-item ${playing ? 'playing' : ''}" data-path="${f.path}">
          <div class="file-icon">${playing ? '<span class="playing-pulse">♫</span>' : f.ext.replace('.', '')}</div>
          <div class="file-info">
            <div class="file-name">${f.name}</div>
            <div class="file-meta">${f.ext.replace('.', '').toUpperCase()} · ${size}</div>
          </div>
          <div class="file-action">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          </div>
        </div>`;
    });
    html += `</div>`;
  }
  el.innerHTML = html;

  el.querySelectorAll('.file-item').forEach(item => {
    item.addEventListener('click', () => playFile(item.dataset.path));
  });

  el.querySelectorAll('.folder-header').forEach(header => {
    header.addEventListener('click', () => {
      const folder = header.dataset.folder;
      const content = el.querySelector(`[data-folder-content="${folder}"]`);
      if (collapsedFolders.has(folder)) {
        collapsedFolders.delete(folder);
        header.classList.remove('collapsed');
        content.classList.remove('collapsed');
      } else {
        collapsedFolders.add(folder);
        header.classList.add('collapsed');
        content.classList.add('collapsed');
      }
    });
  });
}

$('searchInput').addEventListener('input', e => renderFiles(e.target.value));
$('btnRefreshFiles').addEventListener('click', loadFiles);

document.querySelectorAll('.sort-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    sortMode = btn.dataset.sort;
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderFiles($('searchInput').value);
  });
});

// ─── Playback ───────────────────────────────────────────────────────────────
async function playFile(path, buildQueue = true) {
  if (!selectedSpeaker) { openSheet(); return; }

  // Build queue from currently visible files
  if (buildQueue) {
    const q = $('searchInput').value.toLowerCase();
    queue = q ? files.filter(f => f.name.toLowerCase().includes(q) || f.path.toLowerCase().includes(q)) : [...files];
    queueIndex = queue.findIndex(f => f.path === path);
    if (queueIndex < 0) queueIndex = 0;
  }

  currentFile = path;
  lastPlayState = 'PLAYING';
  renderFiles($('searchInput').value);

  const name = path.split('/').pop().replace(/\.[^.]+$/, '');
  $('trackName').textContent = name;
  updateQueueIndicator();
  $('playerBar').classList.add('visible');

  try {
    const result = await api('POST', '/api/play', { speaker: selectedSpeaker.name, file: path });
    if (result.success === false) {
      showToast('Speaker could not play this file.', 'error');
      return;
    }
    isPlaying = true;
    updatePlayIcon();
    startPolling();
  } catch (e) {
    showToast('Failed to play. Speaker may be offline.', 'error');
  }
}

async function togglePlay() {
  if (!selectedSpeaker) return;
  const action = isPlaying ? 'Pause' : 'Play';
  try {
    await api('POST', '/api/control', { speaker: selectedSpeaker.name, action });
    isPlaying = !isPlaying;
    updatePlayIcon();
  } catch (e) {
    showToast('Playback control failed. Speaker may be offline.', 'error');
  }
}

async function stop() {
  if (!selectedSpeaker) return;
  try {
    await api('POST', '/api/control', { speaker: selectedSpeaker.name, action: 'Stop' });
    isPlaying = false;
    updatePlayIcon();
    stopPolling();
  } catch (e) {
    showToast('Could not stop playback.', 'error');
  }
}

function playNext(dir) {
  if (!queue.length) return;
  let next = queueIndex + dir;
  if (next >= queue.length) next = 0; // wrap (repeat)
  if (next < 0) next = queue.length - 1; // wrap backward
  queueIndex = next;
  playFile(queue[queueIndex].path, false);
}

function updateQueueIndicator() {
  const el = $('queuePos');
  if (el && queue.length > 0) {
    el.textContent = `${queueIndex + 1} / ${queue.length}`;
  }
}

function updatePlayIcon() {
  $('iconPlay').innerHTML = isPlaying
    ? '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>'
    : '<path d="M8 5v14l11-7z"/>';
}

$('btnPlayPause').addEventListener('click', togglePlay);
$('btnStop').addEventListener('click', stop);
$('btnPrev').addEventListener('click', () => playNext(-1));
$('btnNext').addEventListener('click', () => playNext(1));

// ─── Volume ─────────────────────────────────────────────────────────────────
let volTimeout;
$('volumeSlider').addEventListener('input', e => {
  clearTimeout(volTimeout);
  volTimeout = setTimeout(() => {
    if (selectedSpeaker) api('POST', '/api/volume', { speaker: selectedSpeaker.name, volume: +e.target.value });
  }, 150);
});

// ─── Progress Bar Click-to-Seek ─────────────────────────────────────────────
$('progressBar').addEventListener('click', e => {
  if (!selectedSpeaker || !currentDuration) return;
  const pct = e.offsetX / e.currentTarget.offsetWidth;
  const seekSec = Math.floor(pct * currentDuration);
  const h = Math.floor(seekSec / 3600);
  const m = Math.floor((seekSec % 3600) / 60);
  const s = seekSec % 60;
  const pos = `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  api('POST', '/api/seek', { speaker: selectedSpeaker.name, position: pos });
});

// ─── Status Polling ─────────────────────────────────────────────────────────
let currentDuration = 0;
let pollFailCount = 0;
let reconnecting = false;

function parseTime(str) {
  if (!str || str === 'NOT_IMPLEMENTED') return 0;
  const parts = str.split(':').map(Number);
  if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
  if (parts.length === 2) return parts[0] * 60 + parts[1];
  return 0;
}

function fmtTime(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${m}:${String(s).padStart(2, '0')}`;
}

async function fetchStatus() {
  if (!selectedSpeaker) return;
  try {
    const data = await api('GET', `/api/status/${encodeURIComponent(selectedSpeaker.name)}`);
    pollFailCount = 0;

    if (data.volume != null) $('volumeSlider').value = data.volume;

    const dur = parseTime(data.position?.duration);
    const pos = parseTime(data.position?.position);
    currentDuration = dur;

    $('trackPos').textContent = fmtTime(pos);
    $('trackDur').textContent = fmtTime(dur);
    $('progressFill').style.width = dur > 0 ? ((pos / dur) * 100) + '%' : '0%';

    const newState = data.state;
    const wasPlaying = isPlaying;
    isPlaying = newState === 'PLAYING';
    if (wasPlaying !== isPlaying) updatePlayIcon();

    // Auto-advance: track finished (was PLAYING, now STOPPED, position near duration)
    if (!autoAdvancing && lastPlayState === 'PLAYING' && newState === 'STOPPED' && dur > 0 && (dur - pos) < 5 && queue.length > 0) {
      autoAdvancing = true;
      lastPlayState = newState;
      playNext(1);
      setTimeout(() => { autoAdvancing = false; }, 4000);
      return;
    }
    lastPlayState = newState;

    if (data.position?.track && data.position.track !== $('trackName').textContent) {
      $('trackName').textContent = data.position.track;
    }
  } catch (e) {
    pollFailCount++;
    if (pollFailCount === 3 && !reconnecting) {
      reconnecting = true;
      stopPolling();
      showToast('Lost connection to speaker. Trying to reconnect…', 'warning');
      tryReconnect();
    }
  }
}

async function tryReconnect() {
  const prevName = selectedSpeaker?.name;
  try {
    const data = await api('GET', '/api/discover');
    speakers = data.speakers || [];
    renderSpeakerList();
    updateSpeakerBar();
    // Try to reconnect to the same speaker by name (or partial match for groups)
    if (prevName) {
      const match = speakers.find(s => s.name === prevName || prevName.includes(s.name) || s.name.includes(prevName));
      if (match) {
        selectSpeaker(match);
        pollFailCount = 0;
        reconnecting = false;
        showToast('Reconnected to ' + match.name, 'success');
        startPolling();
        return;
      }
    }
    if (speakers.length > 0) {
      selectSpeaker(speakers[0]);
      pollFailCount = 0;
      reconnecting = false;
      showToast('Reconnected to ' + speakers[0].name, 'success');
      startPolling();
    } else {
      showToast('No speakers found. Will retry…', 'warning');
      setTimeout(tryReconnect, 10000);
    }
  } catch (e) {
    showToast('Reconnect failed. Will retry…', 'warning');
    setTimeout(tryReconnect, 10000);
  }
}

function startPolling() {
  stopPolling();
  fetchStatus();
  pollTimer = setInterval(fetchStatus, 2000);
}

function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

// ─── Init ───────────────────────────────────────────────────────────────────
(async function init() {
  // Auto-discover speakers on first launch (not just load empty list)
  await rescanSpeakers();
  await loadFiles();
  if (selectedSpeaker) startPolling();
})();
</script>
</body>
</html>
